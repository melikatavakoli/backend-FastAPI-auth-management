version: '3.8'

services:
  db:
    image: docker.arvancloud.ir/postgres:15-alpine
    container_name: examle
    restart: unless-stopped
    environment:
      POSTGRES_USER: examle
      POSTGRES_PASSWORD: examle
      POSTGRES_DB: examle
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: examle
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://examle:examle@db:5432/examle
      SECRET_KEY: your-secret-key-change-this
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: development
      DEBUG: "True"
    depends_on:
      - db
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
